<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Test Player — LabyrinthGame</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body { background: #050510; overflow: hidden; font-family: 'Inter', system-ui, sans-serif; }
      canvas#characterCanvas { display: block; width: 100vw; height: 100vh; }
      #hud { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; user-select: none; }
      #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 20px; height: 20px; }
      #crosshair::before, #crosshair::after { content: ''; position: absolute; background: rgba(255,255,255,0.7); }
      #crosshair::before { width: 2px; height: 16px; top: 2px; left: 9px; }
      #crosshair::after { width: 16px; height: 2px; top: 9px; left: 2px; }
      #controls-panel { position: absolute; bottom: 24px; left: 24px; background: rgba(10, 10, 30, 0.75); backdrop-filter: blur(12px); border: 1px solid rgba(100, 150, 255, 0.3); border-radius: 12px; padding: 16px 20px; color: rgba(200, 220, 255, 0.9); font-size: 13px; }
      .key { display: inline-block; background: rgba(60, 80, 150, 0.6); border: 1px solid rgba(100, 150, 255, 0.5); border-radius: 4px; padding: 2px 6px; font-size: 12px; font-weight: 600; color: #fff; margin-right: 4px; }
      h3 { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: #4e7bff; margin-bottom: 12px; }
      .control-item { margin-bottom: 6px; display: flex; align-items: center; }
    </style>
  </head>
  <body>
    <canvas id="characterCanvas"></canvas>
    <div id="hud">
      <div id="crosshair"></div>
      <div id="controls-panel">
        <h3>Mode Test Joueur</h3>
        <div class="control-item"><span class="key">Z S Q D</span> Déplacement</div>
        <div class="control-item"><span class="key">Shift</span> Courir</div>
        <div class="control-item"><span class="key">Espace</span> Sauter</div>
        <div class="control-item"><span class="key">V</span> Changer de vue (FPS/TPS)</div>
        <div class="control-item"><span class="key">Clic</span> Capturer la souris</div>
      </div>
    </div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
